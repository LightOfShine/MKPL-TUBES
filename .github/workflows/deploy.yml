name: Continuous Deployment

# Workflow ini HANYA berjalan pada push ke branch main
# Deploy Maven Site (Javadoc + Coverage + Inspection Reports) ke GitHub Pages
on:
  push:
    branches: [ "main", "continuous-deployment" ]

# Permission yang diperlukan untuk deploy ke GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Hanya izinkan satu deployment berjalan pada satu waktu
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Job 1: Build semua reports dan site
  build-site:
    name: Build Maven Site
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Step 3: Jalankan tests terlebih dahulu
      - name: Run Tests
        run: mvn -B clean test

      # Step 4: Generate Maven Site dengan semua reports
      # Ini akan membuat folder target/site/ dari awal
      - name: Generate Maven Site
        run: mvn -B site -DskipTests

      # Step 5: Generate Surefire Report dan pastikan ada di target/site/
      - name: Generate and Place Surefire Report
        run: |
          echo "=== Step 1: Generate surefire report ==="
          mvn -B surefire-report:report-only || true
          
          echo "=== Step 2: Search for surefire-report.html everywhere ==="
          find target -name "surefire-report.html" -type f 2>/dev/null
          
          echo "=== Step 3: Copy to target/site/ if not already there ==="
          if [ ! -f target/site/surefire-report.html ]; then
            FOUND=$(find target -name "surefire-report.html" -type f | head -1)
            if [ -n "$FOUND" ]; then
              echo "Found at: $FOUND — copying to target/site/"
              cp "$FOUND" target/site/surefire-report.html
            else
              echo "Not found via plugin, generating from XML manually..."
              # Fallback: buat halaman HTML sederhana dari XML test results
              cat > target/site/surefire-report.html << 'EOF'
          <!DOCTYPE html>
          <html><head><title>Surefire Report</title>
          <style>
          body { font-family: -apple-system, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
          h1 { color: #333; } table { border-collapse: collapse; width: 100%; margin-top: 20px; }
          th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
          th { background: #4CAF50; color: white; } .pass { color: green; } .fail { color: red; }
          </style></head><body>
          <h1>🧪 Surefire Test Report</h1>
          <p>Generated from CI/CD Pipeline</p>
          <table><tr><th>Test Class</th><th>Tests</th><th>Failures</th><th>Errors</th><th>Status</th></tr>
          EOF
              # Parse XML test results
              for xml in target/surefire-reports/TEST-*.xml; do
                if [ -f "$xml" ]; then
                  name=$(grep -oP 'name="\K[^"]+' "$xml" | head -1)
                  tests=$(grep -oP 'tests="\K[^"]+' "$xml" | head -1)
                  failures=$(grep -oP 'failures="\K[^"]+' "$xml" | head -1)
                  errors=$(grep -oP 'errors="\K[^"]+' "$xml" | head -1)
                  if [ "$failures" = "0" ] && [ "$errors" = "0" ]; then
                    status='<span class="pass">✅ PASSED</span>'
                  else
                    status='<span class="fail">❌ FAILED</span>'
                  fi
                  echo "<tr><td>$name</td><td>$tests</td><td>$failures</td><td>$errors</td><td>$status</td></tr>" >> target/site/surefire-report.html
                fi
              done
              echo "</table></body></html>" >> target/site/surefire-report.html
              echo "✅ Generated fallback surefire-report.html from XML"
            fi
          else
            echo "✅ surefire-report.html already exists in target/site/"
          fi
          
          echo "=== Final verification ==="
          ls -la target/site/surefire-report.html 2>/dev/null && echo "✅ CONFIRMED: surefire-report.html is ready" || echo "❌ FAILED"

      # Step 7: Tambahkan custom index page
      - name: Create Custom Index Page
        run: |
          cat > target/site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="id">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>CI/CD Java Maven - Project Reports</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
                      min-height: 100vh;
                      color: #e0e0e0;
                  }
                  .container {
                      max-width: 900px;
                      margin: 0 auto;
                      padding: 40px 20px;
                  }
                  h1 {
                      text-align: center;
                      font-size: 2.5rem;
                      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
                      -webkit-background-clip: text;
                      -webkit-text-fill-color: transparent;
                      margin-bottom: 10px;
                  }
                  .subtitle {
                      text-align: center;
                      color: #a0a0c0;
                      margin-bottom: 40px;
                      font-size: 1.1rem;
                  }
                  .cards {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                      gap: 20px;
                  }
                  .card {
                      background: rgba(255,255,255,0.05);
                      border: 1px solid rgba(255,255,255,0.1);
                      border-radius: 16px;
                      padding: 24px;
                      transition: all 0.3s ease;
                      text-decoration: none;
                      color: inherit;
                      display: block;
                  }
                  .card:hover {
                      background: rgba(255,255,255,0.1);
                      transform: translateY(-4px);
                      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
                  }
                  .card .icon { font-size: 2rem; margin-bottom: 12px; }
                  .card h3 { font-size: 1.2rem; margin-bottom: 8px; color: #fff; }
                  .card p { color: #a0a0c0; font-size: 0.9rem; line-height: 1.5; }
                  .footer {
                      text-align: center;
                      margin-top: 40px;
                      color: #606080;
                      font-size: 0.85rem;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>CI/CD Java Maven Demo</h1>
                  <p class="subtitle">Pipeline CI/CD Reports - Tugas Besar Manajemen Konfigurasi dan Evolusi PL</p>

                  <div class="cards">
                      <a class="card" href="apidocs/index.html">
                          <div class="icon">📖</div>
                          <h3>Javadoc</h3>
                          <p>Dokumentasi API lengkap yang dihasilkan secara otomatis dari komentar Javadoc dalam source code.</p>
                      </a>

                      <a class="card" href="jacoco/index.html">
                          <div class="icon">📊</div>
                          <h3>Code Coverage</h3>
                          <p>Laporan cakupan kode dari JaCoCo menunjukkan seberapa banyak kode yang diuji oleh unit tests.</p>
                      </a>

                      <a class="card" href="checkstyle.html">
                          <div class="icon">✨</div>
                          <h3>Checkstyle Report</h3>
                          <p>Hasil pemeriksaan coding style berdasarkan konvensi Google Java Style Guide.</p>
                      </a>

                      <a class="card" href="spotbugs.html">
                          <div class="icon">🐛</div>
                          <h3>SpotBugs Report</h3>
                          <p>Analisis statis untuk mendeteksi potensi bug di dalam bytecode Java.</p>
                      </a>

                      <a class="card" href="pmd.html">
                          <div class="icon">🔍</div>
                          <h3>PMD Report</h3>
                          <p>Deteksi code smells, kode yang tidak optimal, dan potensi masalah kualitas kode.</p>
                      </a>

                      <a class="card" href="surefire-report.html">
                          <div class="icon">🧪</div>
                          <h3>Test Results</h3>
                          <p>Laporan detail hasil eksekusi unit tests menggunakan JUnit 5 framework.</p>
                      </a>
                  </div>

                  <div class="footer">
                      <p>Auto-deployed via GitHub Actions CI/CD Pipeline</p>
                  </div>
              </div>
          </body>
          </html>
          HTMLEOF

      # Step 6: Setup GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step 7: Upload site sebagai Pages artifact
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site

  # Job 2: Deploy ke GitHub Pages
  deploy:
    name: Deploy to GitHub Pages
    needs: build-site
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # Deploy menggunakan official GitHub Pages action
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Summary
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Successfully deployed to GitHub Pages!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **URL:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Available Reports:" >> $GITHUB_STEP_SUMMARY
          echo "- 📖 [Javadoc](${{ steps.deployment.outputs.page_url }}apidocs/index.html)" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 [Code Coverage](${{ steps.deployment.outputs.page_url }}jacoco/index.html)" >> $GITHUB_STEP_SUMMARY
          echo "- ✨ [Checkstyle](${{ steps.deployment.outputs.page_url }}checkstyle.html)" >> $GITHUB_STEP_SUMMARY
          echo "- 🐛 [SpotBugs](${{ steps.deployment.outputs.page_url }}spotbugs.html)" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 [PMD](${{ steps.deployment.outputs.page_url }}pmd.html)" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 [Test Results](${{ steps.deployment.outputs.page_url }}surefire-report.html)" >> $GITHUB_STEP_SUMMARY
